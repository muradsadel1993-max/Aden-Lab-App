name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup EAS
        run: npm install -g eas-cli

      - name: Install dependencies
        run: npm install

      - name: Build APK
        run: eas build --platform android --local --non-interactive
